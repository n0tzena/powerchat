<!DOCTYPE html>
<html>
    <head>
        <title>Powerchat</title>
        <style>
            body 
            { 
                margin: 0; 
                padding-bottom: 3rem; 
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
                background-color: black;
                color: white;
            }

            #form 
            { 
                background: rgba(0, 0, 0, 0.15); 
                padding: 0.25rem; 
                position: fixed; 
                bottom: 0; left: 0; right: 0; 
                display: flex; 
                height: 3rem; 
                box-sizing: border-box; 
                backdrop-filter: blur(10px); 
            }
            #input 
            { 
                border: none; 
                padding: 0 1rem; 
                flex-grow: 1; 
                border-radius: 2rem; 
                margin: 0.25rem; 
            }
            #input:focus 
            { 
                outline: none; 
            }
            #form > button 
            { 
                background: #333; 
                border: none; 
                padding: 0 1rem; 
                margin: 0.25rem; 
                border-radius: 3px; 
                outline: none; 
                color: #fff; 
            }

            #messages { list-style-type: none; margin: 0; padding: 0; }
            #messages > li 
            {
                display: flex;
            }
            #messages > li:nth-child(odd) { background: #1b1b1b; }

            #messages > li > img 
            {
                width: 48px;
                height: 48px;
            }

            .username
            {
                display: block;
            }

            .message
            {
                display: block;
            }

        </style>
    </head>
    <body>
        <div id="main"> 
            <ul id="messages">
                <li>
                    <!--img src="https://i.imgur.com/aKbmQcN.png">
                    <div>
                        <span class="username">Username - 11:00</span>
                        <span class="message">Message</span>
                    </div-->
                </li>
            </ul>
            <form id="form" action="">
            <input id="input" autocomplete="off" /><button>Send</button>
            </form>
        </div>

        <script src="/socket.io/socket.io.js"></script>
        <script>

            var username = localStorage.getItem("username");
            var avatarURL = localStorage.getItem("avatarURL");

            function setupAccount()
            {
                username = prompt("Insira seu nome de usuário: ");
                avatarURL = prompt("Insira a URL de uma imagem para ser seu avatar: ");

                localStorage.setItem("username", username);
                localStorage.setItem("avatarURL", avatarURL);
            }

            function createMessage(message)
            {
                var item = document.createElement('li');
                var avatar = document.createElement('img');
                var textDiv = document.createElement('div');

                var usernameText = document.createElement('span');
                usernameText.classList.add('username');

                var messageText = document.createElement('span');
                messageText.classList.add('message');

                item.append(avatar);
                item.append(textDiv);
                textDiv.append(usernameText);
                textDiv.append(messageText);

                avatar.src = message.msgAvatar;
                usernameText.textContent = message.msgUser;
                messageText.textContent = message.msg;

                return item;
            }

            if(!username || username == "" || username == "null")
                setupAccount();

            var socket = io();

            var messages = document.getElementById('messages');
            var form = document.getElementById('form');
            var input = document.getElementById('input');

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                if(input.value)
                {
                    const now = new Date();

                    var messageObject = {
                        msgUser: `${username} - ${now.getHours()}:${now.getMinutes()}`,
                        msgAvatar: avatarURL,
                        msg: input.value
                    }

                    socket.emit('chat message', messageObject);
                    input.value = '';
                }
            });

            socket.on('chat message', (msg) => {
                messages.appendChild(createMessage(msg));
                window.scrollTo(0, document.body.scrollHeight);
            });

        </script>
    </body>
</html>
